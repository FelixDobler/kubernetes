apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: proxy-proto-test
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        volumeMounts:
          - mountPath: /etc/nginx
            name: nginx-conf
        ports:
        - containerPort: 80
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf-proxy-proto
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: proxy-proto-test
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf-proxy-proto
  namespace: proxy-proto-test
data:
  nginx.conf: |
    events {
    worker_connections  1024;
    }

    http{

    # Log the real client IP
    log_format proxy_log '$proxy_protocol_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log proxy_log;

    # nginx-proxy-protocol.conf - Nginx configured to accept Proxy Protocol
    server {
        # The 'proxy_protocol' parameter tells Nginx to expect the PP header
        listen 80 proxy_protocol;

        # Define trusted proxy addresses (the HAProxy container's network)
        set_real_ip_from 10.0.0.0/8;

        # Use the Proxy Protocol source address as the real client IP
        real_ip_header proxy_protocol;

        location / {
            # Pass the real client IP to upstream applications
            proxy_set_header X-Real-IP $proxy_protocol_addr;
            proxy_set_header X-Forwarded-For $proxy_protocol_addr;
            return 200 'Client IP: $proxy_protocol_addr\nServer: $hostname\n';
            add_header Content-Type text/plain;
        }

        location /health {
            return 200 '{"status": "ok"}';
            add_header Content-Type application/json;
        }
    }
    }
