---
apiVersion: v1
kind: Namespace
metadata:
  name: velero
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: velero
spec:
  interval: 10m0s
  url: https://vmware-tanzu.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m0s
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  values:
    # disable default backupStorageLocation and volumeSnapshotLocation
    backupsEnabled: false
    snapshotsEnabled: false
    
    configuration:
      features: "EnableCSI" # comma separated list of features to enable

      # defaultSnapshotMoveData: true # enable when snapshot data movement is confirmed to work

      defaultBackupStorageLocation: default
      defaultVolumeSnapshotLocation: zfspv

    credentials:
      existingSecret: velero-credentials

    nodeAgent:
      disableHostPath: true
      containerSecurityContext:
        privileged: true

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.2
        volumeMounts:
          - name: plugins
            mountPath: /target
      - name: velero-plugin-for-openebs
        image: openebs/velero-plugin:3.6.0
        volumeMounts:
          - name: plugins
            mountPath: /target
