---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chartRef:
    kind: OCIRepository
    name: renovate
    namespace: flux-system
  values:
    renovate:
      existingConfigFile: /usr/src/app/config.json
      persistence:
        cache:
          enabled: true
    extraVolumes:
      - name: secret-volume
        secret:
          secretName: renovate-selfhosted-config
    extraVolumeMounts:
      - name: secret-volume
        mountPath: /usr/src/app/config.json
        subPath: config
