---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chartRef:
    kind: OCIRepository
    name: renovate
    namespace: flux-system
  # TODO fix way of providing config
  values:
    renovate:
      configIsSecret: true
  valuesFrom:
    - kind: Secret
      name: renovate-selfhosted-config
      valuesKey: config
      targetPath: renovate.config
