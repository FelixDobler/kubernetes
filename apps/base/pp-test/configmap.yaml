apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-proto-config
  namespace: pp-test
data:
  nginx.conf: |
    events {}

    http {
      log_format main '$remote_addr - $proxy_protocol_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

      server {
        listen 80 proxy_protocol;

        real_ip_header proxy_protocol;

        set_real_ip_from 0.0.0.0/0;

        location / {
          default_type text/plain;

          add_header X-Real-IP $proxy_protocol_addr;
          add_header X-Forwarded-For $proxy_protocol_addr;

          return 200 "client_ip=$proxy_protocol_addr\n";
        }
      }
    }
