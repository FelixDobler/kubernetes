apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: bentopdf
  namespace: bentopdf
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  parentRef:
    name: http-s
    namespace: kgateway-system
    kind: Gateway
    group: gateway.networking.k8s.io
  listeners:
  - protocol: HTTPS
    port: 443
    hostname: "${application_hostname}"
    name: https-bentopdf
    tls:
      mode: Terminate
      certificateRefs:
        - name: bentopdf-tls
          kind: Secret
    allowedRoutes:
      kinds:
        - kind: HTTPRoute
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kubernetes.io/metadata.name: bentopdf
