apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: dms-smtp
  namespace: dms
spec:
  parentRefs:
  - name: dms-gateway
    namespace: kgateway-system
    sectionName: smtp
  rules:
  - backendRefs:
    - name: docker-mailserver
      port: 25
