---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arbitrary-name
spec:
  chart:
    spec:
      chart: docker-mailserver
      sourceRef:
        kind: HelmRepository
        name: docker-mailserver
        namespace: flux-system
      version: "5.1.1"
  values:
    deployment:
      env:
        OVERRIDE_HOSTNAME: ${application_hostname} # You must OVERRIDE this!
