apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pp-test
  namespace: flux-system
spec:
  dependsOn:
    - name: production-apps
  interval: 1h
  retryInterval: 2m  
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: apps
  path: ./base/pp-test
  prune: true
  wait: true
