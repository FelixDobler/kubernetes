apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bentopdf
  namespace: flux-system
spec:
  dependsOn:
    - name: production-apps
  interval: 1h
  retryInterval: 2m  
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: apps
  path: ./production/bentopdf
  prune: true
  wait: true
  postBuild:
    substitute:
      application_hostname: pdf.k8s.doblerones.de
