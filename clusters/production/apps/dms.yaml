apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dms
  namespace: flux-system
spec:
  dependsOn:
    - name: production-apps
  interval: 1h
  retryInterval: 2m  
  timeout: 5m
  sourceRef:
    kind: ExternalArtifact
    name: apps
  path: ./production/dms
  prune: true
  wait: true
  postBuild:
    substitute:
      application_hostname: mail-test.doblerones.de
  